<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Easy Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed;
      --surface: #ffffff;
      --border: #e0dbd4;
      --black: #1a1a1a;
      --gold: #c8a96e;
      --gold-light: #d4b97e;
      --gold-dim: rgba(200,169,110,0.15);
      --muted: #6b6560;
      --text: #1a1a1a;
      --green: #52b788;
      --red: #e07070;
      --shadow: rgba(0,0,0,0.06);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { position: sticky; top: 0; z-index: 40; background: var(--bg); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-family: 'Playfair Display', Georgia, serif; font-size: 1.25rem; font-weight: 600; color: var(--black); }
    .topbar-title span { color: var(--gold); }
    .topbar-actions { display: flex; gap: 0.75rem; align-items: center; }
    .btn { padding: 0.55rem 1.1rem; border-radius: 8px; font-size: 0.83rem; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s; border: none; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-primary { background: var(--gold); color: var(--black); font-weight: 600; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-danger { background: transparent; border: 1px solid rgba(224,112,112,0.4); color: var(--red); }
    .btn-danger:hover { background: rgba(224,112,112,0.08); }
    .content { padding: 2rem; max-width: 1100px; margin: 0 auto; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.75rem; font-weight: 700; color: var(--black); margin-bottom: 0.4rem; }
    .page-header p { font-size: 0.875rem; color: var(--muted); }
    .admin-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(200,169,110,0.12); border: 1px solid rgba(200,169,110,0.3); color: var(--gold); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.25rem 0.65rem; border-radius: 100px; margin-bottom: 1rem; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; box-shadow: 0 2px 8px var(--shadow); }
    .stat-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem; }
    .stat-value { font-family: 'Playfair Display', Georgia, serif; font-size: 2rem; font-weight: 700; color: var(--black); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px var(--shadow); }
    .card-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-title { font-size: 0.9rem; font-weight: 600; color: var(--black); }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); padding: 0.85rem 1.5rem; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody td { padding: 1rem 1.5rem; font-size: 0.85rem; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--black); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #faf8f5; }
    .linked-badge { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.2rem 0.55rem; border-radius: 100px; font-size: 0.72rem; font-weight: 500; }
    .linked-yes { background: rgba(82,183,136,0.12); color: var(--green); }
    .linked-no  { background: rgba(224,112,112,0.12); color: var(--red); }
    .edit-field { display: flex; align-items: center; gap: 0.5rem; }
    .inline-input { padding: 0.35rem 0.6rem; border: 1.5px solid var(--border); border-radius: 6px; font-size: 0.83rem; font-family: 'Inter', sans-serif; color: var(--black); background: var(--bg); width: 160px; transition: border-color 0.15s; }
    .inline-input:focus { outline: none; border-color: var(--gold); background: #fff; }
    .save-btn { padding: 0.3rem 0.7rem; background: var(--gold); color: var(--black); border: none; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .save-btn:hover { background: var(--gold-light); }
    .save-btn:disabled { opacity: 0.5; cursor: default; }
    .embed-snippet { font-family: 'Courier New', monospace; font-size: 0.7rem; color: var(--muted); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.6rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; cursor: pointer; title: 'Click to copy'; }
    .embed-snippet:hover { border-color: var(--gold); color: var(--gold); }
    .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--muted); font-size: 0.85rem; gap: 0.5rem; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }
    .notification { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface); border: 1px solid rgba(82,183,136,0.3); border-radius: 10px; padding: 1rem 1.25rem; font-size: 0.85rem; color: var(--black); box-shadow: 0 4px 20px var(--shadow); opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
    .notification.show { opacity: 1; transform: translateY(0); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 680px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-title { font-family: 'Playfair Display', Georgia, serif; font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.25rem; color: var(--muted); cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 6px; }
    .modal-close:hover { background: var(--bg); color: var(--black); }
    .modal-body { padding: 1.25rem 1.5rem; overflow-y: auto; }
    .review-card { border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
    .review-card:last-child { margin-bottom: 0; }
    .review-stars { color: var(--gold); font-size: 1rem; margin-bottom: 0.4rem; }
    .review-comment { font-size: 0.88rem; color: var(--black); line-height: 1.6; margin-bottom: 0.6rem; }
    .review-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); }
    .review-featured { display: inline-block; font-size: 0.68rem; font-weight: 600; background: rgba(200,169,110,0.15); color: var(--gold); border-radius: 100px; padding: 0.15rem 0.5rem; margin-left: 0.5rem; }
    .auth-email { font-size: 0.78rem; color: var(--muted); }
    .row-saving { opacity: 0.5; pointer-events: none; }
    @media (max-width: 900px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .content { padding: 1rem; }
      thead th:nth-child(4), tbody td:nth-child(4) { display: none; }
      thead th:nth-child(5), tbody td:nth-child(5) { display: none; }
      thead th:nth-child(6), tbody td:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Easy<span>Review</span> <span style="font-size:0.9rem;font-weight:400;color:var(--muted);font-family:Inter,sans-serif"> — Admin</span></div>
  <div class="topbar-actions">
    <button class="btn btn-outline" onclick="loadBusinesses()">↻ Refresh</button>
    <button class="btn btn-outline" onclick="handleLogout()">Sign out</button>
  </div>
</div>

<div class="content">
  <div class="page-header">
    <div class="admin-badge">🔐 Admin Panel</div>
    <h1>Businesses</h1>
    <p>Manage all registered businesses on the Easy Review platform.</p>
  </div>

  <div class="card" style="margin-bottom:2rem;">
    <div class="card-header"><div class="card-title">Invite a Business</div></div>
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:1rem;align-items:end;">
        <div>
          <label style="display:block;font-size:0.8rem;font-weight:500;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em;">Contact Name</label>
          <input class="inline-input" id="inviteName" type="text" placeholder="Glenn" style="width:100%;" />
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;font-weight:500;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em;">Mobile Number</label>
          <input class="inline-input" id="invitePhone" type="tel" placeholder="0412 345 678" style="width:100%;" />
        </div>
        <div>
          <label style="display:block;font-size:0.8rem;font-weight:500;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em;">Link to Business <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
          <select class="inline-input" id="inviteBusinessId" style="width:100%;">
            <option value="">— New business —</option>
          </select>
        </div>
        <button class="save-btn" onclick="sendInvite()" id="inviteBtn" style="padding:0.5rem 1.25rem;font-size:0.85rem;white-space:nowrap;">Send Signup Link ✉️</button>
      </div>
      <div id="inviteMsg" style="font-size:0.82rem;display:none;margin-top:0.75rem;"></div>
    </div>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="stat-label">Total Businesses</div><div class="stat-value" id="statTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Linked to Auth User</div><div class="stat-value" id="statLinked">—</div></div>
    <div class="stat-card"><div class="stat-label">Unlinked</div><div class="stat-value" id="statUnlinked">—</div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="card-title">All Businesses</div>
    </div>
    <div id="tableWrap">
      <div class="loading"><div class="spinner"></div> Loading…</div>
    </div>
  </div>
</div>

<div class="notification" id="notification"></div>

<!-- Reviews modal -->
<div class="modal-overlay" id="reviewsModal" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Reviews</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL    = 'https://qcjyyqchtwhouylhktty.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_f5d8j7AV1Jjk9GfblFpmoA_OTcBPL_S';
  const SITE_URL        = 'https://easyreviewer.netlify.app';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentSession = null;
  let businesses = [];

  // --- Auth helpers ---
  function getAuthHeaders(extra = {}) {
    return currentSession
      ? { 'Authorization': 'Bearer ' + currentSession.access_token, ...extra }
      : { ...extra };
  }

  function handle401() {
    window.location.href = 'login.html';
  }

  async function initAuth() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    currentSession = session;
    loadBusinesses();
  }

  async function handleLogout() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  // --- Load businesses ---
  async function loadBusinesses() {
    document.getElementById('tableWrap').innerHTML =
      '<div class="loading"><div class="spinner"></div> Loading…</div>';

    const res = await fetch('/api/admin-get-businesses', { headers: getAuthHeaders() });

    if (res.status === 401) { handle401(); return; }
    if (res.status === 403) {
      document.getElementById('tableWrap').innerHTML =
        '<div class="empty-state">Access denied — admin only.</div>';
      return;
    }

    const json = await res.json();
    businesses = json.businesses || [];

    // Stats
    const linked = businesses.filter(b => b.user_id).length;
    document.getElementById('statTotal').textContent    = businesses.length;
    document.getElementById('statLinked').textContent   = linked;
    document.getElementById('statUnlinked').textContent = businesses.length - linked;

    renderTable();
    renderInviteDropdown();
  }

  function renderInviteDropdown() {
    const sel = document.getElementById('inviteBusinessId');
    const unlinked = businesses.filter(b => !b.user_id);
    sel.innerHTML = '<option value="">— New business —</option>' +
      unlinked.map(b => `<option value="${b.id}" data-name="${esc(b.name)}">${esc(b.name)}</option>`).join('');
  }

  // --- Render table ---
  function renderTable() {
    if (businesses.length === 0) {
      document.getElementById('tableWrap').innerHTML =
        '<div class="empty-state">No businesses registered yet.</div>';
      return;
    }

    const rows = businesses.map(b => {
      const embedCode = `<script src="${SITE_URL}/api/embed?id=${encodeURIComponent(b.name)}"><\/script>`;
      return `
        <tr id="row-${b.id}">
          <td>
            <div class="edit-field">
              <input class="inline-input" id="name-${b.id}" value="${esc(b.name)}" />
            </div>
          </td>
          <td style="white-space:nowrap;">
            <button class="btn btn-outline" onclick="viewReviews('${b.id}','${esc(b.name)}')" style="padding:0.3rem 0.7rem;font-size:0.78rem;">⭐ Reviews</button>
            <a href="dashboard.html?preview=${b.id}" target="_blank" class="btn btn-outline" style="padding:0.3rem 0.7rem;font-size:0.78rem;margin-left:0.4rem;text-decoration:none;display:inline-block;">📊 Dashboard</a>
          </td>
          <td>
            <div class="edit-field">
              <input class="inline-input" id="email-${b.id}" value="${esc(b.email || '')}" />
            </div>
            <div class="auth-email" style="margin-top:0.3rem;">
              ${b.auth_email
                ? '🔑 ' + esc(b.auth_email)
                : `<div class="edit-field" style="margin-top:0.4rem;">
                    <input class="inline-input" id="linkEmail-${b.id}" type="email" placeholder="their@email.com" style="width:160px;" />
                    <button class="save-btn" onclick="linkUser('${b.id}')">Link</button>
                   </div>`
              }
            </div>
          </td>
          <td>
            <div class="edit-field">
              <input class="inline-input" id="smslimit-${b.id}" type="number" min="0" value="${b.monthly_sms_limit ?? 50}" style="width:80px;" />
            </div>
          </td>
          <td>
            <span class="linked-badge ${b.user_id ? 'linked-yes' : 'linked-no'}">
              ${b.user_id ? '✓ Linked' : '✗ Unlinked'}
            </span>
          </td>
          <td>
            <div class="embed-snippet" onclick="copyText('${embedCode.replace(/'/g,"\\'")}', this)" title="Click to copy embed code">
              &lt;script src=&hellip;embed?id=${esc(b.name)}&hellip;&gt;
            </div>
          </td>
          <td style="white-space:nowrap;">
            <button class="save-btn" onclick="saveBusiness('${b.id}')">Save</button>
          </td>
          <td>
            <div class="edit-field">
              <input class="inline-input" id="slug-${b.id}" value="${esc(b.slug || '')}" />
            </div>
          </td>
        </tr>`;
    }).join('');

    document.getElementById('tableWrap').innerHTML = `
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Business Name</th>
              <th>Actions</th>
              <th>Contact Email / Auth</th>
              <th>SMS / mo</th>
              <th>Status</th>
              <th>Embed Code</th>
              <th></th>
              <th>Slug</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  // --- Save a business ---
  async function saveBusiness(id) {
    const row = document.getElementById('row-' + id);
    const name     = document.getElementById('name-'     + id).value.trim();
    const slug     = document.getElementById('slug-'     + id).value.trim();
    const email    = document.getElementById('email-'    + id).value.trim();
    const smsLimit = document.getElementById('smslimit-' + id).value;

    if (!name) { showNotification('Business name cannot be empty', false); return; }
    if (!slug)  { showNotification('Slug cannot be empty', false); return; }

    row.classList.add('row-saving');

    const res = await fetch('/api/admin-update-business', {
      method: 'POST',
      headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ id, name, slug, email, monthly_sms_limit: smsLimit }),
    });

    row.classList.remove('row-saving');

    if (res.status === 401) { handle401(); return; }

    const json = await res.json();

    if (!res.ok) {
      showNotification('Error: ' + (json.error || 'Save failed'), false);
      return;
    }

    // Update local data
    const idx = businesses.findIndex(b => b.id === id);
    if (idx !== -1) Object.assign(businesses[idx], json.business);

    showNotification('✓ Business updated');
  }

  // --- Utilities ---
  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function copyText(text, el) {
    navigator.clipboard.writeText(text).then(() => {
      const orig = el.innerHTML;
      el.textContent = '✓ Copied!';
      el.style.color = 'var(--green)';
      setTimeout(() => { el.innerHTML = orig; el.style.color = ''; }, 1500);
    });
  }

  function showNotification(msg, success = true) {
    const n = document.getElementById('notification');
    n.textContent = msg;
    n.style.borderColor = success ? 'rgba(82,183,136,0.3)' : 'rgba(224,112,112,0.3)';
    n.style.color = success ? 'var(--green)' : 'var(--red)';
    n.classList.add('show');
    setTimeout(() => n.classList.remove('show'), 3000);
  }

  async function linkUser(businessId) {
    const emailInput = document.getElementById('linkEmail-' + businessId);
    const email = emailInput.value.trim();
    if (!email) { showNotification('Enter the user\'s email address', false); return; }

    emailInput.disabled = true;
    const res = await fetch('/api/admin-link-business', {
      method: 'POST',
      headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ business_id: businessId, user_email: email }),
    });
    emailInput.disabled = false;

    if (res.status === 401) { handle401(); return; }
    const json = await res.json();
    if (res.ok) {
      showNotification('✓ Business linked to ' + email);
      loadBusinesses();
    } else {
      showNotification('Error: ' + (json.error || 'Link failed'), false);
    }
  }

  async function sendInvite() {
    const name  = document.getElementById('inviteName').value.trim();
    const phone = document.getElementById('invitePhone').value.trim();
    const btn   = document.getElementById('inviteBtn');
    const msg   = document.getElementById('inviteMsg');
    const sel = document.getElementById('inviteBusinessId');
    const business_id   = sel.value || '';
    const business_name = sel.options[sel.selectedIndex]?.dataset?.name || '';
    if (!name || !phone) { msg.textContent = 'Please enter a name and phone number'; msg.style.color = 'var(--red)'; msg.style.display = 'block'; return; }
    btn.textContent = 'Sending…'; btn.disabled = true;
    const res = await fetch('/api/admin-send-invite', {
      method: 'POST',
      headers: getAuthHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify({ name, phone, business_id, business_name }),
    });
    btn.textContent = 'Send Signup Link ✉️'; btn.disabled = false;
    const json = await res.json();
    if (res.ok) {
      msg.textContent = '✓ Invite sent to ' + name + (business_name ? ' for ' + business_name : '');
      msg.style.color = 'var(--green)';
      document.getElementById('inviteName').value = '';
      document.getElementById('invitePhone').value = '';
      sel.value = '';
    } else {
      msg.textContent = json.error || 'Failed to send invite';
      msg.style.color = 'var(--red)';
    }
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  }

  // --- View Reviews modal ---
  async function viewReviews(businessId, businessName) {
    document.getElementById('modalTitle').textContent = businessName + ' — Reviews';
    document.getElementById('modalBody').innerHTML = '<div class="loading"><div class="spinner"></div> Loading…</div>';
    document.getElementById('reviewsModal').style.display = 'flex';

    const { data: reviews, error } = await sb
      .from('reviews')
      .select('*')
      .eq('business_id', businessId)
      .order('created_at', { ascending: false });

    if (error || !reviews) {
      document.getElementById('modalBody').innerHTML = '<p style="color:var(--red);font-size:0.88rem;">Failed to load reviews.</p>';
      return;
    }

    if (reviews.length === 0) {
      document.getElementById('modalBody').innerHTML = '<p style="color:var(--muted);font-size:0.88rem;text-align:center;padding:2rem 0;">No reviews yet.</p>';
      return;
    }

    const stars = r => '★'.repeat(r) + '☆'.repeat(5 - r);
    const html = reviews.map(r => `
      <div class="review-card">
        <div class="review-stars">${stars(r.rating)}</div>
        <div class="review-comment">${esc(r.comment || '')}</div>
        <div class="review-meta">
          <span>${esc(r.customer_name || 'Anonymous')}${r.featured ? '<span class="review-featured">★ Featured</span>' : ''}</span>
          <span>${new Date(r.created_at).toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' })}</span>
        </div>
      </div>`).join('');

    document.getElementById('modalBody').innerHTML = `<p style="font-size:0.8rem;color:var(--muted);margin-bottom:1rem;">${reviews.length} review${reviews.length !== 1 ? 's' : ''}</p>` + html;
  }

  function closeModal() {
    document.getElementById('reviewsModal').style.display = 'none';
  }

  initAuth();
</script>
</body>
</html>
