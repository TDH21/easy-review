<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Easy Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed;
      --card: #ffffff;
      --black: #1a1a1a;
      --gold: #c8a96e;
      --gold-light: #d4b97e;
      --muted: #6b6560;
      --border: #e0dbd4;
      --green: #52b788;
      --red: #e07070;
      --shadow: rgba(0,0,0,0.08);
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px var(--shadow);
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--black);
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo span { color: var(--gold); }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--black);
      margin-bottom: 0.4rem;
      text-align: center;
    }
    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .form-group { margin-bottom: 1.1rem; }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--black);
      margin-bottom: 0.4rem;
    }
    .form-input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--black);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input::placeholder { color: rgba(0,0,0,0.3); }
    .form-input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
    }
    .submit-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.9rem;
      background: var(--gold);
      color: var(--black);
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.5;
      text-align: center;
    }
    .msg.error { background: rgba(224,112,112,0.1); border: 1px solid rgba(224,112,112,0.3); color: var(--red); }
    .msg.success { background: rgba(82,183,136,0.1); border: 1px solid rgba(82,183,136,0.3); color: var(--green); }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .signup-link {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .signup-link a { color: var(--gold); text-decoration: none; font-weight: 500; }
    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Easy<span>Review</span></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to your business dashboard.</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" id="email" type="email" placeholder="you@yourbusiness.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" id="password" type="password" placeholder="Your password" required autocomplete="current-password" />
      </div>
      <button class="submit-btn" id="submitBtn" type="submit">Log in</button>
      <div class="msg" id="msg"></div>
    </form>

    <div class="divider"></div>
    <div class="signup-link">Don't have an account? <a href="signup.html">Create one</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL     = 'https://qcjyyqchtwhouylhktty.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_f5d8j7AV1Jjk9GfblFpmoA_OTcBPL_S';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn      = document.getElementById('submitBtn');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      btn.textContent = 'Logging in…';
      btn.disabled = true;
      document.getElementById('msg').style.display = 'none';

      const { error } = await sb.auth.signInWithPassword({ email, password });

      if (error) {
        showMsg(friendlyAuthError(error.message), 'error');
        btn.textContent = 'Log in';
        btn.disabled = false;
        return;
      }

      showMsg('Logged in. Redirecting…', 'success');
      window.location.href = 'dashboard.html';
    }

    function friendlyAuthError(msg) {
      if (!msg) return 'Something went wrong. Please try again.';
      const m = msg.toLowerCase();
      if (m.includes('invalid login') || m.includes('invalid credentials')) return 'Incorrect email or password. Please try again.';
      if (m.includes('email not confirmed')) return 'Please confirm your email address before logging in.';
      if (m.includes('too many requests')) return 'Too many login attempts. Please wait a moment and try again.';
      return msg;
    }
  </script>
</body>
</html>
