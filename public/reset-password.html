<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Easy Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed; --card: #ffffff; --black: #1a1a1a;
      --gold: #c8a96e; --gold-light: #d4b97e;
      --muted: #6b6560; --border: #e0dbd4;
      --green: #52b788; --red: #e07070; --shadow: rgba(0,0,0,0.08);
    }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 8px 40px var(--shadow); }
    .logo { font-family: 'Playfair Display', Georgia, serif; font-size: 1.3rem; font-weight: 700; color: var(--black); text-align: center; margin-bottom: 2rem; }
    .logo span { color: var(--gold); }
    h1 { font-family: 'Playfair Display', Georgia, serif; font-size: 1.6rem; font-weight: 700; color: var(--black); margin-bottom: 0.4rem; text-align: center; }
    .subtitle { font-size: 0.875rem; color: var(--muted); text-align: center; margin-bottom: 2rem; line-height: 1.5; }
    .form-group { margin-bottom: 1.1rem; }
    .form-label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--black); margin-bottom: 0.4rem; }
    .form-input { width: 100%; padding: 0.8rem 1rem; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; color: var(--black); font-size: 0.95rem; font-family: 'Inter', sans-serif; transition: border-color 0.15s, box-shadow 0.15s; }
    .form-input::placeholder { color: rgba(0,0,0,0.3); }
    .form-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(200,169,110,0.15); }
    .submit-btn { width: 100%; margin-top: 0.5rem; padding: 0.9rem; background: var(--gold); color: var(--black); border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .submit-btn:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { display: none; margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.85rem; line-height: 1.5; text-align: center; }
    .msg.error { background: rgba(224,112,112,0.1); border: 1px solid rgba(224,112,112,0.3); color: var(--red); }
    .msg.success { background: rgba(82,183,136,0.1); border: 1px solid rgba(82,183,136,0.3); color: var(--green); }
    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .back-link { text-align: center; font-size: 0.85rem; color: var(--muted); }
    .back-link a { color: var(--gold); text-decoration: none; font-weight: 500; }
    .back-link a:hover { text-decoration: underline; }
    .state { display: none; }
    .state.active { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Easy<span>Review</span></div>

    <!-- State 1: Request reset email -->
    <div class="state active" id="stateRequest">
      <h1>Reset password</h1>
      <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
      <form onsubmit="handleRequest(event)">
        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" id="email" type="email" placeholder="you@yourbusiness.com" required autocomplete="email" />
        </div>
        <button class="submit-btn" id="requestBtn" type="submit">Send reset link</button>
        <div class="msg" id="requestMsg"></div>
      </form>
      <div class="divider"></div>
      <div class="back-link"><a href="login.html">← Back to login</a></div>
    </div>

    <!-- State 2: Set new password -->
    <div class="state" id="stateSetPassword">
      <h1>New password</h1>
      <p class="subtitle">Choose a new password for your account.</p>
      <form onsubmit="handleSetPassword(event)">
        <div class="form-group">
          <label class="form-label" for="password">New password</label>
          <input class="form-input" id="password" type="password" placeholder="At least 8 characters" required autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="passwordConfirm">Confirm password</label>
          <input class="form-input" id="passwordConfirm" type="password" placeholder="Repeat your new password" required autocomplete="new-password" />
        </div>
        <button class="submit-btn" id="setBtn" type="submit">Set new password</button>
        <div class="msg" id="setMsg"></div>
      </form>
    </div>

    <!-- State 3: Done -->
    <div class="state" id="stateDone">
      <h1>Password updated</h1>
      <p class="subtitle">Your password has been changed. You can now log in with your new password.</p>
      <div class="divider"></div>
      <div class="back-link"><a href="login.html">Go to login →</a></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qcjyyqchtwhouylhktty.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_f5d8j7AV1Jjk9GfblFpmoA_OTcBPL_S';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function showState(id) {
      document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showMsg(elId, text, type) {
      const el = document.getElementById(elId);
      el.textContent = text;
      el.className = 'msg ' + type;
      el.style.display = 'block';
    }

    // Listen for PASSWORD_RECOVERY event (fires when user clicks the reset email link)
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showState('stateSetPassword');
      }
    });

    async function handleRequest(e) {
      e.preventDefault();
      const btn = document.getElementById('requestBtn');
      const email = document.getElementById('email').value.trim();
      btn.textContent = 'Sending…'; btn.disabled = true;

      const { error } = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html',
      });

      btn.textContent = 'Send reset link'; btn.disabled = false;

      if (error) {
        showMsg('requestMsg', error.message || 'Something went wrong. Please try again.', 'error');
      } else {
        // Always show success (don't reveal whether email exists)
        showMsg('requestMsg', 'Check your email — if an account exists you\'ll receive a reset link shortly.', 'success');
      }
    }

    async function handleSetPassword(e) {
      e.preventDefault();
      const btn = document.getElementById('setBtn');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('passwordConfirm').value;

      if (password !== confirm) {
        showMsg('setMsg', 'Passwords do not match.', 'error'); return;
      }
      if (password.length < 8) {
        showMsg('setMsg', 'Password must be at least 8 characters.', 'error'); return;
      }

      btn.textContent = 'Saving…'; btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password });

      btn.textContent = 'Set new password'; btn.disabled = false;

      if (error) {
        showMsg('setMsg', error.message || 'Failed to update password. Please try again.', 'error');
      } else {
        await sb.auth.signOut();
        showState('stateDone');
      }
    }
  </script>
</body>
</html>
