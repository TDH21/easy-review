<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Review</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: #1a1a1a; }
    p { color: #666; margin-bottom: 1.5rem; }
    label { display: block; font-weight: 500; margin-bottom: 0.4rem; color: #333; }
    input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: #4f46e5; }
    button {
      width: 100%;
      padding: 0.75rem;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    .status { margin-top: 1rem; text-align: center; font-size: 0.9rem; color: #666; }
    .status.success { color: #16a34a; }
    .status.error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Easy Review</h1>
    <p>Send a review request via SMS to your customer.</p>

    <label for="name">Customer Name</label>
    <input type="text" id="name" placeholder="Jane Smith">

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="+1 555 000 0000">

    <button onclick="sendRequest()">Send Review Request</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    async function sendRequest() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const status = document.getElementById('status');

      if (!name || !phone) {
        status.textContent = 'Please fill in all fields.';
        status.className = 'status error';
        return;
      }

      status.textContent = 'Sending...';
      status.className = 'status';

      try {
        const res = await fetch('/.netlify/functions/send-sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone })
        });

        const data = await res.json();

        if (res.ok) {
          status.textContent = 'Review request sent successfully!';
          status.className = 'status success';
          document.getElementById('name').value = '';
          document.getElementById('phone').value = '';
        } else {
          status.textContent = data.error || 'Something went wrong.';
          status.className = 'status error';
        }
      } catch (err) {
        status.textContent = 'Network error. Please try again.';
        status.className = 'status error';
      }
    }
  </script>
</body>
</html>
